name: R Package

on:
  pull_request:
    paths:
      - ".github/workflows/r-package.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "src/**"
      - "tools/**"
      - "configure"
      - "configure.win"
      - "cleanup"
  push:
    branches:
      - main
    tags:
      - "r-v*"
    paths:
      - ".github/workflows/r-package.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "src/**"
      - "tools/**"
      - "configure"
      - "configure.win"
      - "cleanup"
  workflow_dispatch:

permissions:
  contents: read

env:
  NOT_CRAN: true

jobs:
  build-source:
    name: Build Source Tarball
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild
          needs: check

      - name: Build source package
        shell: bash
        run: |
          mkdir -p dist
          R CMD build .
          mv freestiler_*.tar.gz dist/

      - uses: actions/upload-artifact@v4
        with:
          name: r-source-package
          path: dist/*.tar.gz

  check-linux:
    name: R CMD Check (Linux)
    runs-on: ubuntu-latest
    needs: build-source

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - name: Check package
        shell: bash
        run: |
          R CMD check --as-cran .

  feature-smoke-linux:
    name: Feature Smoke (Linux)
    runs-on: ubuntu-latest
    needs: build-source

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - name: Install package for smoke checks
        shell: bash
        run: |
          mkdir -p .ci-lib
          R CMD INSTALL --library=.ci-lib --no-multiarch .

      - name: Run feature smoke checks
        shell: bash
        run: |
          Rscript tools/feature-smoke.R --lib .ci-lib --require-rust-duckdb --require-geoparquet

  feature-smoke-windows:
    name: Feature Smoke (Windows custom build)
    runs-on: windows-2022
    needs: build-source

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat
          needs: check

      - name: Build feature-enabled Windows library
        shell: bash
        env:
          FREESTILER_LIB: build/library
        run: |
          Rscript build.R

      - name: Run feature smoke checks
        shell: bash
        run: |
          Rscript tools/feature-smoke.R --lib build/library --require-rust-duckdb --require-geoparquet

      - name: Run feature-focused test files against custom build
        shell: bash
        run: |
          Rscript -e ".libPaths(c('build/library', .libPaths())); testthat::test_file('tests/testthat/test-file-input.R'); testthat::test_file('tests/testthat/test-query.R')"

  build-windows-package:
    name: Build Package (Windows)
    runs-on: windows-2022
    needs: build-source

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - name: Build binary package (Windows)
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc.exe
        run: |
          mkdir -p binary
          R CMD INSTALL --build .
          mv *.zip binary/

      - uses: actions/upload-artifact@v4
        with:
          name: r-binary-windows
          path: binary/*.zip

  build-binaries:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: r-binary-macos
            package_glob: "*.tgz"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - name: Build binary package (macOS)
        shell: bash
        run: |
          mkdir -p binary
          R CMD INSTALL --build .
          mv *.tgz binary/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binary/${{ matrix.package_glob }}

  release-assets:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/r-v')
    needs:
      - build-source
      - check-linux
      - feature-smoke-linux
      - feature-smoke-windows
      - build-windows-package
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
