name: R Package

on:
  pull_request:
    paths:
      - ".github/workflows/r-package.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "src/**"
      - "tools/**"
      - "tests/**"
      - "configure"
      - "configure.win"
      - "cleanup"
  push:
    branches:
      - main
    tags:
      - "r-v*"
    paths:
      - ".github/workflows/r-package.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "src/**"
      - "tools/**"
      - "tests/**"
      - "configure"
      - "configure.win"
      - "cleanup"
  workflow_dispatch:

permissions:
  contents: read

env:
  NOT_CRAN: "true"

jobs:
  check:
    name: R-CMD-check (Windows)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo + Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - uses: r-lib/actions/check-r-package@v2
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc.exe
        with:
          args: 'c("--no-manual", "--no-multiarch")'
          error-on: '"error"'
          upload-snapshots: true

  binary:
    name: Windows binary
    # Skip on PRs (the check job already compiles); build/publish on main and tags.
    if: github.event_name != 'pull_request'
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo + Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild
          needs: check

      - name: Use online Cargo resolution in CI
        shell: bash
        run: |
          rm -f src/rust/vendor.tar.xz
          rm -rf src/vendor src/.cargo

      - name: Build + install Windows binary
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc.exe
        run: |
          mkdir -p binary
          R CMD INSTALL --build .
          mv *.zip binary/

      - name: Verify both Rust backends are compiled in
        shell: bash
        run: |
          Rscript tools/feature-smoke.R --require-rust-duckdb --require-geoparquet

      - uses: actions/upload-artifact@v4
        with:
          name: r-binary-windows
          path: binary/*.zip

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/r-v')
        uses: softprops/action-gh-release@v2
        with:
          files: binary/*.zip
          generate_release_notes: true
